<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Re:Zero+ — Starting Life in Another World</title>
  <meta name="description" content="Assista Re:Zero — Starting Life in Another World online">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E❄%3C/text%3E%3C/svg%3E">
</head>
<body>

  <header id="header">
    <div class="logo">Re:Zero+</div>
    <nav>
      <a href="#inicio" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>INÍCIO</span>
      </a>
      <a href="#catalogo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
        <span>CATÁLOGO</span>
      </a>
      <a href="#sobre">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span>SOBRE</span>
      </a>
    </nav>
    <button class="search-btn" aria-label="Buscar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </header>

  <section class="hero" id="inicio">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-content">
      <h1 class="hero-title" id="hero-title"></h1>
      <div class="hero-meta">
        <span id="hero-ano"></span>
        <span class="sep">•</span>
        <span id="hero-temp"></span>
        <span class="sep">•</span>
        <span class="tag" id="hero-qual"></span>
      </div>
      <p class="hero-sinopse" id="hero-sinopse"></p>
      <div class="hero-actions">
        <button class="btn btn-primary" id="btn-assistir">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Assistir
        </button>
      </div>
    </div>
  </section>

  <section class="section" id="continuar-section">
    <h2 class="section-title">Continuar Assistindo</h2>
    <div class="row" id="row-continuar"></div>
  </section>

  <section class="section">
    <h2 class="section-title">Adicionados Recentemente</h2>
    <div class="row" id="row-recentes"></div>
  </section>

  <section class="section" id="catalogo">
    <h2 class="section-title">Catálogo Completo</h2>
    <div class="grid" id="grid-catalogo"></div>
  </section>

  <footer id="sobre">
    <div class="logo">Re:Zero+</div>
    <p>Projeto pessoal sem fins lucrativos · Re:Zero é propriedade de seus respectivos detentores de direitos</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
